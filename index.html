<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ប្រព័ន្ធផ្ទុកឯកសារមេរៀន</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }
        
        .upload-section {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }
        
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input[type="password"]:focus {
            border-color: #667eea;
            outline: none;
        }
        
        input[type="file"] {
            width: 100%;
            padding: 12px;
            background: white;
            border: 2px dashed #667eea;
            border-radius: 8px;
            cursor: pointer;
        }
        
        input[type="file"]:hover {
            background: #f0f3ff;
        }
        
        .upload-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            width: 100%;
        }
        
        .upload-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .files-section {
            margin-top: 30px;
        }
        
        h2 {
            color: #555;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .file-count {
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 16px;
        }
        
        .files-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        
        .file-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            transition: transform 0.3s;
            border: 1px solid #e0e0e0;
        }
        
        .file-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.3);
        }
        
        .file-icon {
            font-size: 40px;
            text-align: center;
            margin-bottom: 10px;
        }
        
        .file-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            word-break: break-word;
            text-align: center;
            font-size: 16px;
        }
        
        .file-meta {
            font-size: 12px;
            color: #888;
            text-align: center;
            margin-bottom: 15px;
        }
        
        .view-btn {
            display: inline-block;
            background: #667eea;
            color: white;
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 5px;
            font-size: 14px;
            transition: background 0.3s;
            border: none;
            cursor: pointer;
            width: 100%;
            text-align: center;
        }
        
        .view-btn:hover {
            background: #5a67d8;
        }
        
        .delete-btn {
            background: #f56565;
            margin-top: 8px;
        }
        
        .delete-btn:hover {
            background: #e53e3e;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 10px;
            max-width: 90%;
            max-height: 90%;
            position: relative;
        }
        
        .close-modal {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 30px;
            cursor: pointer;
            color: #666;
        }
        
        .close-modal:hover {
            color: #333;
        }
        
        .modal-body {
            margin-top: 20px;
            overflow: auto;
            max-height: 80vh;
        }
        
        .modal-body img, .modal-body video, .modal-body iframe {
            max-width: 100%;
            max-height: 80vh;
        }
        
        .error-message {
            background: #fed7d7;
            color: #c53030;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }
        
        .success-message {
            background: #c6f6d5;
            color: #22543d;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }
        
        .password-input-group {
            position: relative;
        }
        
        .toggle-password {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #666;
        }
        
        .file-info {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 ប្រព័ន្ធផ្ទុកឯកសារមេរៀន</h1>
        
        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>
        
        <div class="upload-section">
            <div class="form-group">
                <label>🔑 ពាក្យសម្ងាត់សម្រាប់ Upload</label>
                <div class="password-input-group">
                    <input type="password" id="password" placeholder="បញ្ចូលពាក្យសម្ងាត់" value="">
                    <span class="toggle-password" onclick="togglePassword()">👁️</span>
                </div>
            </div>
            
            <div class="form-group">
                <label>📎 ជ្រើសរើសឯកសារ</label>
                <input type="file" id="fileInput" multiple>
                <div class="file-info" id="fileInfo"></div>
            </div>
            
            <button class="upload-btn" onclick="uploadFiles()">
                ⬆️ ផ្ទុកឯកសារឡើង
            </button>
        </div>
        
        <div class="files-section">
            <h2>
                📂 ឯកសារដែលបានផ្ទុក
                <span class="file-count" id="fileCount">0</span>
            </h2>
            <div class="files-grid" id="filesGrid"></div>
        </div>
    </div>
    
    <div class="modal" id="viewModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script>
        // ឈ្មោះ key សម្រាប់រក្សាទុកក្នុង localStorage
        const STORAGE_KEY = 'lesson_files';
        const PASSWORD = 'teva8549';
        
        // ផ្ទុកឯកសារពេលបើកទំព័រ
        let files = [];
        
        // ពិនិត្យមើលថាតើមានឯកសារក្នុង localStorage ដែរឬទេ
        function loadFiles() {
            const storedFiles = localStorage.getItem(STORAGE_KEY);
            if (storedFiles) {
                try {
                    files = JSON.parse(storedFiles);
                    // បម្លែង base64 ត្រឡប់ទៅជា File objects សម្រាប់បង្ហាញ
                } catch (e) {
                    console.error('Error loading files:', e);
                    files = [];
                }
            }
            displayFiles();
        }
        
        // បង្ហាញឯកសារទាំងអស់
        function displayFiles() {
            const filesGrid = document.getElementById('filesGrid');
            const fileCount = document.getElementById('fileCount');
            
            if (files.length === 0) {
                filesGrid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 40px; background: #f8f9fa; border-radius: 10px; color: #666;">📭 មិនទាន់មានឯកសារនៅឡើយទេ</div>';
                fileCount.textContent = '0';
                return;
            }
            
            let html = '';
            files.forEach((file, index) => {
                const fileType = file.type.split('/')[0];
                const fileSize = formatFileSize(file.size);
                const uploadDate = new Date(file.uploadDate).toLocaleString('km-KH');
                
                html += `
                    <div class="file-card">
                        <div class="file-icon">${getFileIcon(file.type)}</div>
                        <div class="file-name">${file.name}</div>
                        <div class="file-meta">
                            ${fileSize} • ${uploadDate}
                        </div>
                        <button class="view-btn" onclick="viewFile(${index})">
                            👁️ មើលឯកសារ
                        </button>
                        <button class="view-btn delete-btn" onclick="deleteFile(${index})">
                            🗑️ លុបឯកសារ
                        </button>
                    </div>
                `;
            });
            
            filesGrid.innerHTML = html;
            fileCount.textContent = files.length;
        }
        
        // ទទួលបាន icon តាមប្រភេទឯកសារ
        function getFileIcon(fileType) {
            if (fileType.startsWith('image/')) return '🖼️';
            if (fileType.startsWith('video/')) return '🎥';
            if (fileType.startsWith('audio/')) return '🎵';
            if (fileType.includes('pdf')) return '📕';
            if (fileType.includes('word') || fileType.includes('document')) return '📘';
            if (fileType.includes('excel') || fileType.includes('sheet')) return '📗';
            if (fileType.includes('powerpoint') || fileType.includes('presentation')) return '📙';
            return '📄';
        }
        
        // ទម្រង់ទំហំឯកសារ
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
        
        // ផ្ទុកឯកសារឡើង
        function uploadFiles() {
            const password = document.getElementById('password').value;
            const fileInput = document.getElementById('fileInput');
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');
            
            // ពិនិត្យពាក្យសម្ងាត់
            if (password !== PASSWORD) {
                showError('ពាក្យសម្ងាត់មិនត្រឹមត្រូវ!');
                return;
            }
            
            if (fileInput.files.length === 0) {
                showError('សូមជ្រើសរើសឯកសារជាមុនសិន!');
                return;
            }
            
            // បម្លែង File objects ទៅជា base64 សម្រាប់រក្សាទុក
            const filesToUpload = Array.from(fileInput.files);
            const uploadPromises = filesToUpload.map(file => {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        resolve({
                            name: file.name,
                            type: file.type,
                            size: file.size,
                            data: e.target.result,
                            uploadDate: new Date().toISOString()
                        });
                    };
                    reader.onerror = reject;
                    reader.readAsDataURL(file);
                });
            });
            
            Promise.all(uploadPromises)
                .then(uploadedFiles => {
                    files = [...files, ...uploadedFiles];
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(files));
                    displayFiles();
                    fileInput.value = '';
                    document.getElementById('password').value = '';
                    showSuccess('ឯកសារត្រូវបានផ្ទុកឡើងដោយជោគជ័យ!');
                })
                .catch(error => {
                    showError('មានបញ្ហាក្នុងការផ្ទុកឯកសារ: ' + error.message);
                });
        }
        
        // មើលឯកសារ
        function viewFile(index) {
            const file = files[index];
            const modal = document.getElementById('viewModal');
            const modalBody = document.getElementById('modalBody');
            
            let content = '';
            if (file.type.startsWith('image/')) {
                content = `<img src="${file.data}" alt="${file.name}">`;
            } else if (file.type.startsWith('video/')) {
                content = `<video controls src="${file.data}"></video>`;
            } else if (file.type.startsWith('audio/')) {
                content = `<audio controls src="${file.data}"></audio>`;
            } else if (file.type.includes('pdf')) {
                content = `<iframe src="${file.data}"></iframe>`;
            } else {
                // សម្រាប់ឯកសារផ្សេងៗ បង្ហាញជា download link
                content = `
                    <div style="text-align: center; padding: 40px;">
                        <div style="font-size: 80px; margin-bottom: 20px;">📄</div>
                        <h3>${file.name}</h3>
                        <p>ទំហំ: ${formatFileSize(file.size)}</p>
                        <a href="${file.data}" download="${file.name}" class="view-btn" style="display: inline-block; width: auto; padding: 10px 30px;">
                            ⬇️ ទាញយកឯកសារ
                        </a>
                    </div>
                `;
            }
            
            modalBody.innerHTML = content;
            modal.style.display = 'flex';
        }
        
        // លុបឯកសារ
        function deleteFile(index) {
            if (confirm('តើអ្នកពិតជាចង់លុបឯកសារនេះមែនទេ?')) {
                files.splice(index, 1);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(files));
                displayFiles();
                showSuccess('ឯកសារត្រូវបានលុបដោយជោគជ័យ!');
            }
        }
        
        // បិទ Modal
        function closeModal() {
            document.getElementById('viewModal').style.display = 'none';
            document.getElementById('modalBody').innerHTML = '';
        }
        
        // បង្ហាញសារកំហុស
        function showError(message) {
            const errorMessage = document.getElementById('errorMessage');
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
            setTimeout(() => {
                errorMessage.style.display = 'none';
            }, 3000);
        }
        
        // បង្ហាញសារជោគជ័យ
        function showSuccess(message) {
            const successMessage = document.getElementById('successMessage');
            successMessage.textContent = message;
            successMessage.style.display = 'block';
            setTimeout(() => {
                successMessage.style.display = 'none';
            }, 3000);
        }
        
        // បង្ហាញ/លាក់ពាក្យសម្ងាត់
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
            } else {
                passwordInput.type = 'password';
            }
        }
        
        // បង្ហាញព័ត៌មានឯកសារដែលបានជ្រើសរើស
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const fileInfo = document.getElementById('fileInfo');
            if (this.files.length > 0) {
                fileInfo.textContent = `បានជ្រើសរើស ${this.files.length} ឯកសារ`;
            } else {
                fileInfo.textContent = '';
            }
        });
        
        // បិទ Modal ពេលចុចក្រៅ
        window.onclick = function(event) {
            const modal = document.getElementById('viewModal');
            if (event.target === modal) {
                closeModal();
            }
        };
        
        // ផ្ទុកឯកសារពេលបើកទំព័រ
        loadFiles();
    </script>
</body>
</html>
