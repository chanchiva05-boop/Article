<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduCloud Pro - ប្រព័ន្ធគ្រប់គ្រងមេរៀនឆ្លាតវៃ</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Khmer OS', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-bubbles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .bg-bubbles span {
            position: absolute;
            bottom: -100px;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: bubble 15s infinite;
        }

        @keyframes bubble {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0.5;
            }
            100% {
                transform: translateY(-1000px) rotate(720deg);
                opacity: 0;
            }
        }

        /* Floating orbs */
        .orb {
            position: fixed;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.05));
            border-radius: 50%;
            filter: blur(50px);
            z-index: 0;
        }

        .orb-1 {
            top: -100px;
            right: -100px;
            background: radial-gradient(circle at 30% 30%, rgba(147, 51, 234, 0.3), rgba(79, 70, 229, 0.1));
        }

        .orb-2 {
            bottom: -100px;
            left: -100px;
            background: radial-gradient(circle at 70% 70%, rgba(236, 72, 153, 0.3), rgba(168, 85, 247, 0.1));
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Header Section */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px 30px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            animation: slideDown 0.6s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
            box-shadow: 0 10px 20px rgba(255, 215, 0, 0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        .logo-text h1 {
            color: white;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }

        .logo-text span {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            font-weight: 400;
        }

        .header-stats {
            display: flex;
            gap: 20px;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.15);
            padding: 10px 20px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .stat-value {
            color: white;
            font-size: 24px;
            font-weight: 700;
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Main Content */
        .content-grid {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 30px;
        }

        /* Upload Card */
        .upload-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.5);
            animation: slideLeft 0.7s ease-out;
        }

        @keyframes slideLeft {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .upload-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .upload-header i {
            font-size: 32px;
            color: #667eea;
            background: linear-gradient(135deg, #667eea20, #764ba220);
            padding: 15px;
            border-radius: 18px;
        }

        .upload-header h2 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .upload-area {
            border: 3px dashed #cbd5e0;
            border-radius: 20px;
            padding: 50px 30px;
            text-align: center;
            background: linear-gradient(135deg, #f8f9ff 0%, #f0f3ff 100%);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-bottom: 25px;
            position: relative;
            overflow: hidden;
        }

        .upload-area::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(102, 126, 234, 0.1), transparent);
            transition: all 0.6s ease;
            transform: translate(-50%, -50%);
        }

        .upload-area:hover::before {
            width: 300px;
            height: 300px;
        }

        .upload-area:hover {
            border-color: #667eea;
            background: linear-gradient(135deg, #f0f3ff 0%, #e8eeff 100%);
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(102, 126, 234, 0.2);
        }

        .upload-icon {
            font-size: 70px;
            color: #667eea;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        .upload-area h3 {
            font-size: 24px;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 10px;
        }

        .upload-area p {
            color: #718096;
            margin-bottom: 20px;
        }

        .file-types {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }

        .file-type-badge {
            background: white;
            padding: 8px 15px;
            border-radius: 30px;
            font-size: 12px;
            color: #4a5568;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.3s;
        }

        .file-type-badge:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
            background: #667eea;
            color: white;
        }

        .file-type-badge i {
            font-size: 14px;
        }

        .btn-upload {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
            margin-top: 20px;
        }

        .btn-upload:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(102, 126, 234, 0.4);
        }

        .btn-upload i {
            font-size: 18px;
        }

        /* Files Section */
        .files-section {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.5);
            animation: slideRight 0.7s ease-out;
        }

        @keyframes slideRight {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .files-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .files-header h2 {
            font-size: 22px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #2d3748;
        }

        .files-header h2 i {
            color: #667eea;
        }

        .file-count-badge {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .files-list {
            max-height: 500px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .files-list::-webkit-scrollbar {
            width: 6px;
        }

        .files-list::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .files-list::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 10px;
        }

        .file-item {
            background: white;
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(102, 126, 234, 0.1);
            position: relative;
            overflow: hidden;
        }

        .file-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 4px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .file-item:hover {
            transform: translateX(5px) scale(1.02);
            box-shadow: 0 15px 30px rgba(102, 126, 234, 0.15);
        }

        .file-item:hover::before {
            opacity: 1;
        }

        .file-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #667eea15, #764ba215);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-right: 15px;
        }

        .file-info {
            flex: 1;
        }

        .file-name {
            font-weight: 700;
            color: #1a202c;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .file-name span {
            background: #e2e8f0;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
            color: #4a5568;
        }

        .file-meta {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 12px;
            color: #718096;
        }

        .file-meta i {
            margin-right: 3px;
        }

        .file-actions {
            display: flex;
            gap: 8px;
        }

        .btn-action {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-view {
            background: linear-gradient(135deg, #10b98120, #05966920);
            color: #10b981;
        }

        .btn-view:hover {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            transform: translateY(-2px);
        }

        .btn-delete {
            background: linear-gradient(135deg, #ef444420, #dc262620);
            color: #ef4444;
        }

        .btn-delete:hover {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            transform: translateY(-2px);
        }

        .btn-download {
            background: linear-gradient(135deg, #3b82f620, #2563eb20);
            color: #3b82f6;
        }

        .btn-download:hover {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            transform: translateY(-2px);
        }

        /* Premium Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            animation: modalFade 0.3s ease-out;
        }

        @keyframes modalFade {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .modal-content {
            background: white;
            border-radius: 30px;
            max-width: 900px;
            width: 90%;
            max-height: 80vh;
            overflow: auto;
            position: relative;
            padding: 30px;
            box-shadow: 0 50px 70px -20px rgba(0,0,0,0.3);
            animation: modalSlide 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes modalSlide {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e2e8f0;
        }

        .modal-header h3 {
            font-size: 20px;
            font-weight: 700;
            color: #1a202c;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .close-modal {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            border: none;
            background: #f1f5f9;
            color: #64748b;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 18px;
        }

        .close-modal:hover {
            background: #ef4444;
            color: white;
            transform: rotate(90deg);
        }

        .preview-container {
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8fafc;
            border-radius: 20px;
            padding: 20px;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            background: linear-gradient(135deg, #f8f9ff, #f0f3ff);
            border-radius: 20px;
        }

        .empty-state i {
            font-size: 80px;
            color: #667eea;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state p {
            color: #4a5568;
            font-size: 16px;
        }

        /* Loading Animation */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive Design */
        @media (max-width: 968px) {
            .content-grid {
                grid-template-columns: 1fr;
            }
            
            .header {
                flex-direction: column;
                gap: 20px;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-bubbles">
        <span style="left: 10%; animation-delay: 2s;"></span>
        <span style="left: 20%; width: 60px; height: 60px; animation-delay: 4s;"></span>
        <span style="left: 35%; width: 80px; height: 80px; animation-delay: 1s;"></span>
        <span style="left: 50%; width: 50px; height: 50px; animation-delay: 6s;"></span>
        <span style="left: 65%; width: 70px; height: 70px; animation-delay: 3s;"></span>
        <span style="left: 80%; width: 45px; height: 45px; animation-delay: 5s;"></span>
        <span style="left: 90%; width: 90px; height: 90px; animation-delay: 2.5s;"></span>
    </div>
    
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="container">
        <!-- Premium Header -->
        <div class="header">
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-gem"></i>
                </div>
                <div class="logo-text">
                    <h1>EduCloud Pro</h1>
                    <span><i class="far fa-star"></i> ប្រព័ន្ធគ្រប់គ្រងមេរៀនឆ្លាតវៃ</span>
                </div>
            </div>
            <div class="header-stats">
                <div class="stat-item">
                    <div class="stat-value" id="totalFiles">0</div>
                    <div class="stat-label"><i class="far fa-file"></i> ឯកសារ</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="totalSize">0 MB</div>
                    <div class="stat-label"><i class="far fa-hdd"></i> ទំហំសរុប</div>
                </div>
            </div>
        </div>

        <!-- Main Content Grid -->
        <div class="content-grid">
            <!-- Upload Section -->
            <div class="upload-card">
                <div class="upload-header">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <h2>ផ្ទុកឯកសារមេរៀន</h2>
                </div>

                <div class="upload-area" id="uploadArea">
                    <i class="fas fa-cloud-upload-alt upload-icon"></i>
                    <h3>អូសឯកសារមកដាក់ទីនេះ</h3>
                    <p>ឬចុចប៊ូតុងខាងក្រោមដើម្បីជ្រើសរើសឯកសារ</p>
                    
                    <div class="file-types">
                        <span class="file-type-badge"><i class="far fa-file-pdf"></i> PDF</span>
                        <span class="file-type-badge"><i class="far fa-file-word"></i> Word</span>
                        <span class="file-type-badge"><i class="far fa-file-excel"></i> Excel</span>
                        <span class="file-type-badge"><i class="far fa-file-powerpoint"></i> PowerPoint</span>
                        <span class="file-type-badge"><i class="far fa-file-image"></i> Image</span>
                        <span class="file-type-badge"><i class="fas fa-video"></i> Video</span>
                        <span class="file-type-badge"><i class="fas fa-music"></i> Audio</span>
                    </div>

                    <input type="file" id="fileInput" class="file-input" multiple accept="*/*" style="display: none;">
                    
                    <button class="btn-upload" onclick="document.getElementById('fileInput').click()">
                        <i class="fas fa-plus-circle"></i>
                        ជ្រើសរើសឯកសារ
                    </button>
                </div>

                <div style="display: flex; justify-content: space-between; align-items: center; padding: 0 10px;">
                    <span style="color: #718096; font-size: 14px;">
                        <i class="fas fa-info-circle"></i> អាចផ្ទុកបានរហូតដល់ 50MB
                    </span>
                    <span style="color: #667eea; font-size: 14px; font-weight: 600;">
                        <i class="fas fa-shield-alt"></i> មានសុវត្ថិភាព 100%
                    </span>
                </div>
            </div>

            <!-- Files Section -->
            <div class="files-section">
                <div class="files-header">
                    <h2>
                        <i class="fas fa-layer-group"></i>
                        បណ្ណាល័យឯកសារ
                    </h2>
                    <div class="file-count-badge">
                        <i class="far fa-file"></i>
                        <span id="fileCount">0</span>
                    </div>
                </div>

                <div id="filesList" class="files-list">
                    <!-- Files will be displayed here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Premium Preview Modal -->
    <div class="modal" id="previewModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>
                    <i class="fas fa-eye" style="color: #667eea;"></i>
                    មើលឯកសារ
                </h3>
                <button class="close-modal" onclick="closePreview()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="preview-container" id="previewContainer">
                <!-- Preview content will be loaded here -->
            </div>
        </div>
    </div>

    <script>
        // Data storage
        let uploadedFiles = [];

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            loadFromStorage();
            setupDragAndDrop();
            updateStats();
        });

        // Load from localStorage
        function loadFromStorage() {
            const saved = localStorage.getItem('educloud_files');
            if (saved) {
                uploadedFiles = JSON.parse(saved);
                displayFiles();
            }
        }

        // Save to localStorage
        function saveToStorage() {
            localStorage.setItem('educloud_files', JSON.stringify(uploadedFiles));
        }

        // Drag and Drop setup
        function setupDragAndDrop() {
            const uploadArea = document.getElementById('uploadArea');

            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                uploadArea.addEventListener(eventName, preventDefaults, false);
            });

            function preventDefaults(e) {
                e.preventDefault();
                e.stopPropagation();
            }

            ['dragenter', 'dragover'].forEach(eventName => {
                uploadArea.addEventListener(eventName, () => {
                    uploadArea.style.borderColor = '#667eea';
                    uploadArea.style.background = 'linear-gradient(135deg, #e8eeff 0%, #dbe4ff 100%)';
                });
            });

            ['dragleave', 'drop'].forEach(eventName => {
                uploadArea.addEventListener(eventName, () => {
                    uploadArea.style.borderColor = '#cbd5e0';
                    uploadArea.style.background = 'linear-gradient(135deg, #f8f9ff 0%, #f0f3ff 100%)';
                });
            });

            uploadArea.addEventListener('drop', (e) => {
                const files = e.dataTransfer.files;
                handleFiles(files);
            });
        }

        // File input handler
        document.getElementById('fileInput').addEventListener('change', function(e) {
            handleFiles(this.files);
            this.value = '';
        });

        // Handle files upload
        function handleFiles(files) {
            let newFiles = [];

            for (let file of files) {
                if (file.size > 50 * 1024 * 1024) {
                    showNotification(`ឯកសារ ${file.name} មានទំហំធំពេក`, 'error');
                    continue;
                }

                const fileInfo = {
                    id: Date.now() + Math.random(),
                    name: file.name,
                    size: file.size,
                    formattedSize: formatFileSize(file.size),
                    type: file.type,
                    uploadedAt: new Date().toISOString(),
                    uploadedAtFormatted: new Date().toLocaleString('km-KH', {
                        hour: '2-digit',
                        minute: '2-digit',
                        day: '2-digit',
                        month: '2-digit',
                        year: 'numeric'
                    })
                };

                // Store file data in localStorage (simplified)
                newFiles.push(fileInfo);
            }

            uploadedFiles = [...uploadedFiles, ...newFiles];
            saveToStorage();
            displayFiles();
            updateStats();
            
            if (newFiles.length > 0) {
                showNotification(`បានផ្ទុកឡើង ${newFiles.length} ឯកសារដោយជោគជ័យ`, 'success');
            }
        }

        // Display files
        function displayFiles() {
            const filesList = document.getElementById('filesList');
            const fileCount = document.getElementById('fileCount');

            if (uploadedFiles.length === 0) {
                filesList.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-folder-open"></i>
                        <p>មិនទាន់មានឯកសារនៅឡើយទេ</p>
                        <small style="color: #a0aec0;">សូមចាប់ផ្តើមផ្ទុកឯកសារមេរៀនរបស់អ្នក</small>
                    </div>
                `;
                fileCount.textContent = '0';
                return;
            }

            fileCount.textContent = uploadedFiles.length;

            // Sort by date (newest first)
            uploadedFiles.sort((a, b) => new Date(b.uploadedAt) - new Date(a.uploadedAt));

            filesList.innerHTML = uploadedFiles.map(file => `
                <div class="file-item">
                    <div style="display: flex; align-items: center; flex: 1;">
                        <div class="file-icon">
                            ${getFileIcon(file.type, file.name)}
                        </div>
                        <div class="file-info">
                            <div class="file-name">
                                ${truncateName(file.name)}
                                <span>${getFileExtension(file.name)}</span>
                            </div>
                            <div class="file-meta">
                                <span><i class="far fa-calendar"></i> ${file.uploadedAtFormatted}</span>
                                <span><i class="far fa-hdd"></i> ${file.formattedSize}</span>
                            </div>
                        </div>
                    </div>
                    <div class="file-actions">
                        <button class="btn-action btn-view" onclick="previewFile('${file.id}')" title="មើល">
                            <i class="fas fa-eye"></i>
                        </button>
                        <button class="btn-action btn-download" onclick="downloadFile('${file.id}')" title="ទាញយក">
                            <i class="fas fa-download"></i>
                        </button>
                        <button class="btn-action btn-delete" onclick="deleteFile('${file.id}')" title="លុប">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // Preview file
        function previewFile(fileId) {
            const file = uploadedFiles.find(f => f.id == fileId);
            if (!file) return;

            const modal = document.getElementById('previewModal');
            const container = document.getElementById('previewContainer');
            
            modal.style.display = 'flex';

            // Simulate file preview (in real app, you'd need actual file data)
            container.innerHTML = `
                <div style="text-align: center; padding: 40px;">
                    <i class="fas fa-file" style="font-size: 80px; color: #667eea; margin-bottom: 20px;"></i>
                    <h4 style="color: #2d3748; margin-bottom: 10px;">${file.name}</h4>
                    <p style="color: #718096; margin-bottom: 20px;">ទំហំ: ${file.formattedSize}</p>
                    <button class="btn-upload" onclick="downloadFile('${file.id}')">
                        <i class="fas fa-download"></i> ទាញយកឯកសារ
                    </button>
                </div>
            `;
        }

        // Download file
        function downloadFile(fileId) {
            const file = uploadedFiles.find(f => f.id == fileId);
            if (!file) return;

            // Create dummy content for download (in real app, you'd have actual file)
            const content = `នេះជាឯកសារមេរៀន: ${file.name}\nទំហំ: ${file.formattedSize}\nបង្ហោះនៅ: ${file.uploadedAtFormatted}`;
            const blob = new Blob([content], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = file.name;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);

            showNotification(`កំពុងទាញយក: ${file.name}`, 'info');
        }

        // Delete file
        function deleteFile(fileId) {
            if (confirm('តើអ្នកពិតជាចង់លុបឯកសារនេះមែនទេ?')) {
                uploadedFiles = uploadedFiles.filter(f => f.id != fileId);
                saveToStorage();
                displayFiles();
                updateStats();
                showNotification('បានលុបឯកសារដោយជោគជ័យ', 'success');
            }
        }

        // Close preview modal
        function closePreview() {
            document.getElementById('previewModal').style.display = 'none';
        }

        // Update statistics
        function updateStats() {
            const totalFiles = uploadedFiles.length;
            const totalSizeBytes = uploadedFiles.reduce((acc, file) => acc + file.size, 0);
            const totalSizeMB = (totalSizeBytes / (1024 * 1024)).toFixed(2);

            document.getElementById('totalFiles').textContent = totalFiles;
            document.getElementById('totalSize').textContent = totalSizeMB + ' MB';
        }

        // Helper: Format file size
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // Helper: Get file icon
        function getFileIcon(type, name) {
            if (type.startsWith('image/')) return '<i class="fas fa-image" style="color: #10b981;"></i>';
            if (type.startsWith('video/')) return '<i class="fas fa-video" style="color: #ef4444;"></i>';
            if (type.startsWith('audio/')) return '<i class="fas fa-music" style="color: #f59e0b;"></i>';
            if (type.includes('pdf')) return '<i class="fas fa-file-pdf" style="color: #ef4444;"></i>';
            if (type.includes('word')) return '<i class="fas fa-file-word" style="color: #3b82f6;"></i>';
            if (type.includes('excel')) return '<i class="fas fa-file-excel" style="color: #10b981;"></i>';
            if (type.includes('powerpoint')) return '<i class="fas fa-file-powerpoint" style="color: #f97316;"></i>';
            
            const ext = name.split('.').pop().toLowerCase();
            const iconMap = {
                'pdf': '<i class="fas fa-file-pdf" style="color: #ef4444;"></i>',
                'doc': '<i class="fas fa-file-word" style="color: #3b82f6;"></i>',
                'docx': '<i class="fas fa-file-word" style="color: #3b82f6;"></i>',
                'xls': '<i class="fas fa-file-excel" style="color: #10b981;"></i>',
                'xlsx': '<i class="fas fa-file-excel" style="color: #10b981;"></i>',
                'ppt': '<i class="fas fa-file-powerpoint" style="color: #f97316;"></i>',
                'pptx': '<i class="fas fa-file-powerpoint" style="color: #f97316;"></i>',
                'mp4': '<i class="fas fa-video" style="color: #ef4444;"></i>',
                'mp3': '<i class="fas fa-music" style="color: #f59e0b;"></i>',
                'jpg': '<i class="fas fa-image" style="color: #10b981;"></i>',
                'png': '<i class="fas fa-image" style="color: #10b981;"></i>'
            };
            
            return iconMap[ext] || '<i class="fas fa-file" style="color: #64748b;"></i>';
        }

        // Helper: Get file extension
        function getFileExtension(name) {
            return '.' + name.split('.').pop().toUpperCase();
        }

        // Helper: Truncate long names
        function truncateName(name, maxLength = 30) {
            if (name.length <= maxLength) return name;
            return name.substr(0, maxLength) + '...';
        }

        // Show notification (simple alert for demo)
        function showNotification(message, type) {
            // You can implement a toast notification here
            console.log(`[${type}] ${message}`);
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('previewModal');
            if (event.target === modal) {
                closePreview();
            }
        }
    </script>
</body>
</html>
