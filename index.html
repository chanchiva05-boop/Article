<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TEVA</title>
    
    <link rel="apple-touch-icon" href="teva.png">
    <link rel="icon" type="image/png" sizes="32x32" href="teva.png">
    <link rel="icon" type="image/png" sizes="192x192" href="teva.png">
    
    <meta name="theme-color" content="#0a0a2a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TEVA">
    <meta name="mobile-web-app-capable" content="yes">
   meta name="application-name" content="TEVA">
    <meta name="msapplication-TileColor" content="#0a0a2a">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Khmer:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            height: 100vh;
            overflow: hidden;
            background: #0a0a2a;
            font-family: 'Noto Sans Khmer', 'Inter', sans-serif;
        }
        
        .gradient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(25, 35, 70, 0.8), rgba(10, 10, 42, 0.95));
            z-index: 0;
        }
        
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                repeating-linear-gradient(45deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 2px, transparent 2px, transparent 8px),
                repeating-linear-gradient(135deg, rgba(212,175,55,0.03) 0px, rgba(212,175,55,0.03) 1px, transparent 1px, transparent 12px);
            z-index: 1;
            pointer-events: none;
        }
        
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            z-index: 0;
            animation: floatOrb 20s ease-in-out infinite;
        }
        
        .orb-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(212,175,55,0.4), rgba(100,80,20,0.1));
            top: -150px;
            right: -100px;
        }
        
        .orb-2 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(80,120,200,0.3), rgba(30,50,100,0.1));
            bottom: -200px;
            left: -150px;
            animation-delay: -5s;
        }
        
        .orb-3 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(245,226,140,0.3), rgba(150,120,50,0.1));
            top: 40%;
            left: 20%;
            animation-delay: -10s;
        }
        
        @keyframes floatOrb {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -40px) scale(1.05); }
            66% { transform: translate(-20px, 30px) scale(0.95); }
        }
        
        .glass-panel {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            text-align: center;
            width: 100%;
            max-width: 480px;
            padding: 0 20px;
        }
        
        .header-badge {
            margin-bottom: 40px;
            opacity: 0;
            animation: fadeSlideUp 0.8s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
            animation-delay: 0.3s;
        }
        
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 14px;
            background: rgba(15, 20, 35, 0.7);
            backdrop-filter: blur(20px);
            padding: 16px 32px;
            border-radius: 120px;
            border: 1px solid rgba(212, 175, 55, 0.4);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.4);
            transition: all 0.3s ease;
        }
        
        .badge-icon {
            width: 10px;
            height: 10px;
            background: #d4af37;
            border-radius: 50%;
            box-shadow: 0 0 12px #d4af37;
            animation: pulse 1.5s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.4); }
        }
        
        .badge-text {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 1.5px;
            color: #f0e9cf;
            text-transform: uppercase;
            font-family: 'Inter', sans-serif;
        }
        
        .badge-text span {
            color: #d4af37;
            font-weight: 700;
        }
        
        .card {
            background: rgba(12, 18, 28, 0.55);
            backdrop-filter: blur(24px);
            border-radius: 48px;
            padding: 48px 32px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            opacity: 0;
            animation: fadeSlideUp 0.8s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
            animation-delay: 0.5s;
            transition: transform 0.4s ease;
        }
        
        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(212, 175, 55, 0.35);
        }
        
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        
        /* BUTTON STYLES - NO OUTER GLOW */
        .btn {
            width: 100%;
            padding: 18px 24px;
            border: none;
            border-radius: 40px;
            font-size: 17px;
            font-weight: 600;
            font-family: 'Noto Sans Khmer', 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(105deg, #1e2a3a 0%, #0f1722 100%);
            color: #e8e2c7;
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: none;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            border-color: rgba(212, 175, 55, 0.7);
            background: linear-gradient(105deg, #253544, #121a28);
            box-shadow: none;
        }
        
        .btn:active {
            transform: translateY(1px);
        }
        
        .toast-premium {
            margin-top: 24px;
            display: none;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: rgba(10, 20, 18, 0.85);
            backdrop-filter: blur(16px);
            padding: 12px 24px;
            border-radius: 60px;
            border: 1px solid rgba(74, 222, 128, 0.4);
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .toast-premium .toast-icon {
            font-size: 18px;
        }
        
        .toast-premium .toast-message {
            font-size: 14px;
            font-weight: 500;
            color: #4ade80;
        }
        
        .line-decoration {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #d4af37, #f5e28c, #d4af37, transparent);
            bottom: -25px;
        }
        
        .card-footer {
            margin-top: 28px;
            display: flex;
            justify-content: center;
            gap: 12px;
        }
        
        .dot {
            width: 6px;
            height: 6px;
            background: rgba(212, 175, 55, 0.5);
            border-radius: 50%;
        }
        
        .text-to-copy {
            position: absolute;
            opacity: 0;
            pointer-events: none;
            height: 0;
            overflow: hidden;
        }
        
        .birds-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 15;
            pointer-events: none;
        }
        
        .bird {
            position: absolute;
            width: 40px;
            height: 25px;
            opacity: 0.6;
        }
        
        .bird-body {
            position: absolute;
            width: 30px;
            height: 15px;
            background: rgba(255, 245, 200, 0.8);
            border-radius: 50%;
            top: 5px;
            left: 5px;
        }
        
        .bird-wing {
            position: absolute;
            width: 20px;
            height: 12px;
            background: rgba(255, 240, 180, 0.8);
            border-radius: 50%;
        }
        
        .bird-wing.left {
            top: 8px;
            left: 0;
            transform: rotate(-20deg);
            animation: wingFlapLeft 0.8s infinite alternate;
        }
        
        .bird-wing.right {
            top: 8px;
            right: 0;
            transform: rotate(20deg);
            animation: wingFlapRight 0.8s infinite alternate;
        }
        
        @keyframes wingFlapLeft {
            0% { transform: rotate(-20deg); }
            100% { transform: rotate(-40deg); }
        }
        
        @keyframes wingFlapRight {
            0% { transform: rotate(20deg); }
            100% { transform: rotate(40deg); }
        }
        
        .bird1 { top: 12%; left: -10%; animation: flyPath1 28s linear infinite; }
        .bird2 { top: 18%; left: -20%; animation: flyPath2 32s linear infinite; animation-delay: 2s; }
        .bird3 { top: 8%; left: -40%; animation: flyPath3 30s linear infinite; animation-delay: 5s; }
        .bird4 { top: 22%; left: -60%; animation: flyPath4 35s linear infinite; animation-delay: 7s; }
        .bird5 { top: 15%; left: -80%; animation: flyPath5 26s linear infinite; animation-delay: 3s; }
        
        @keyframes flyPath1 { 0% { transform: translateX(0); } 100% { transform: translateX(130vw); } }
        @keyframes flyPath2 { 0% { transform: translateX(0); } 100% { transform: translateX(140vw); } }
        @keyframes flyPath3 { 0% { transform: translateX(0); } 100% { transform: translateX(125vw); } }
        @keyframes flyPath4 { 0% { transform: translateX(0); } 100% { transform: translateX(150vw); } }
        @keyframes flyPath5 { 0% { transform: translateX(0); } 100% { transform: translateX(120vw); } }
        
        .mountain-scene {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 45%;
            z-index: 5;
            pointer-events: none;
        }
        
        .peak {
            position: absolute;
            bottom: 0;
            background: linear-gradient(180deg, rgba(8, 12, 22, 0.9), rgba(0, 0, 0, 0.7));
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
        }
        
        .peak-1 { left: 5%; width: 28%; height: 70%; opacity: 0.5; }
        .peak-2 { left: 25%; width: 32%; height: 85%; opacity: 0.6; }
        .peak-3 { left: 55%; width: 25%; height: 60%; opacity: 0.45; }
        .peak-4 { left: 75%; width: 22%; height: 75%; opacity: 0.55; }
        
        .mist {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 35%;
            background: linear-gradient(to top, rgba(255,255,245,0.08), transparent);
            filter: blur(40px);
            z-index: 6;
            pointer-events: none;
            animation: mistMove 22s ease-in-out infinite alternate;
        }
        
        @keyframes mistMove {
            0% { opacity: 0.4; transform: translateX(-5%); }
            100% { opacity: 0.8; transform: translateX(5%); }
        }
        
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }
        
        .particle {
            position: absolute;
            background: rgba(212, 175, 55, 0.3);
            border-radius: 50%;
            animation: floatParticle 12s infinite linear;
        }
        
        @keyframes floatParticle {
            0% { transform: translateY(100vh); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-20vh); opacity: 0; }
        }
        
        .install-prompt {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.95), rgba(180, 145, 35, 0.95));
            color: #0a0a2a;
            padding: 14px 28px;
            border-radius: 60px;
            font-size: 15px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            z-index: 100;
            border: 1px solid rgba(255, 245, 180, 0.6);
            display: none;
            white-space: nowrap;
            transition: all 0.3s ease;
            box-shadow: none;
        }
        
        .install-prompt:hover {
            transform: translateX(-50%) translateY(-2px);
            background: linear-gradient(135deg, #e5c458, #d4af37);
        }
        
        .install-prompt::before {
            content: '📥';
            margin-right: 10px;
            animation: bounce 1s ease-in-out infinite;
            display: inline-block;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }
        
        .status-badge {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-family: monospace;
            font-weight: bold;
            z-index: 200;
            pointer-events: none;
            border: 1px solid rgba(212,175,55,0.3);
        }
        
        .update-notification {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #d4af37, #b8922a);
            color: #0a0a2a;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: bold;
            z-index: 1000;
            font-family: 'Inter', sans-serif;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            animation: fadeInOut 3s ease forwards;
            white-space: nowrap;
        }
        
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(10px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
        }
        
        @media (max-width: 500px) {
            .glass-panel { max-width: 380px; }
            .badge { padding: 12px 24px; }
            .badge-text { font-size: 14px; }
            .card { padding: 36px 24px; }
            .btn { padding: 15px 20px; font-size: 15px; }
            .install-prompt { padding: 12px 22px; font-size: 13px; }
            .update-notification { font-size: 11px; padding: 8px 16px; }
            .status-badge { font-size: 8px; padding: 3px 8px; }
        }
    </style>
</head>

<body>
    <div class="gradient-bg"></div>
    <div class="animated-bg"></div>
    <div class="status-badge" id="statusBadge">● Online</div>
    
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    
    <div class="particles" id="particles"></div>
    
    <div class="glass-panel">
        <div class="header-badge">
            <div class="badge">
                <div class="badge-icon"></div>
                <div class="badge-text">កាលបរិច្ឆេទកំណែ · <span>30 មីនា 2026</span></div>
            </div>
        </div>
        
        <div class="card">
            <div class="button-group">
                <button class="btn" onclick="copyText()">មេតហ្វូន</button>
                <button class="btn" onclick="copyCode()">សែលកាត</button>
            </div>
            
            <div style="display: flex; justify-content: center; margin-top: 28px;">
                <div id="toast" class="toast-premium" style="display: none;">
                    <span class="toast-icon">✓</span>
                    <span class="toast-message">ចម្លងជោគជ័យ</span>
                </div>
                <div id="toastCode" class="toast-premium" style="display: none;">
                    <span class="toast-icon">✓</span>
                    <span class="toast-message">ចម្លងជោគជ័យ</span>
                </div>
            </div>
            
            <div class="card-footer">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
            <div class="line-decoration"></div>
        </div>
    </div>
    
    <div class="text-to-copy" id="textToCopy">កំពុងផ្ទុក...</div>
    <div class="text-to-copy" id="codeToCopy">កំពុងផ្ទុក...</div>
    
    <div class="birds-container">
        <div class="bird bird1"><div class="bird-body"></div><div class="bird-wing left"></div><div class="bird-wing right"></div></div>
        <div class="bird bird2"><div class="bird-body"></div><div class="bird-wing left"></div><div class="bird-wing right"></div></div>
        <div class="bird bird3"><div class="bird-body"></div><div class="bird-wing left"></div><div class="bird-wing right"></div></div>
        <div class="bird bird4"><div class="bird-body"></div><div class="bird-wing left"></div><div class="bird-wing right"></div></div>
        <div class="bird bird5"><div class="bird-body"></div><div class="bird-wing left"></div><div class="bird-wing right"></div></div>
    </div>
    
    <div class="mountain-scene">
        <div class="peak peak-1"></div>
        <div class="peak peak-2"></div>
        <div class="peak peak-3"></div>
        <div class="peak peak-4"></div>
    </div>
    
    <div class="mist"></div>
    
    <button id="installBtn" class="install-prompt">ដំឡើងកម្មវិធី</button>
    
    <script>
        // Particles
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 45; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                const size = Math.random() * 3 + 1;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = 8 + Math.random() * 12 + 's';
                particle.style.opacity = Math.random() * 0.4 + 0.2;
                container.appendChild(particle);
            }
        }
        createParticles();
        
        // Status
        function updateStatus() {
            const badge = document.getElementById('statusBadge');
            if (navigator.onLine) {
                badge.textContent = '● Online';
                badge.style.color = '#4ade80';
            } else {
                badge.textContent = '● Offline';
                badge.style.color = '#fbbf24';
            }
        }
        
        function showUpdateNotification(title, message) {
            const notification = document.createElement('div');
            notification.className = 'update-notification';
            notification.textContent = `✨ ${title}: ${message}`;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 3000);
        }
        
        // Force update
        async function forceUpdateContent() {
            if (!navigator.onLine) return false;
            
            console.log('🔄 Updating...');
            let updated = false;
            
            try {
                const response = await fetch('METFONE.txt?' + Date.now(), { cache: 'no-store' });
                if (response.ok) {
                    const newText = await response.text();
                    const oldText = document.getElementById('textToCopy').textContent;
                    if (oldText !== newText && oldText !== 'កំពុងផ្ទុក...') {
                        document.getElementById('textToCopy').textContent = newText;
                        localStorage.setItem('metfone_text', newText);
                        updated = true;
                        showUpdateNotification('មេតហ្វូន', 'បានធ្វើបច្ចុប្បន្នភាព');
                    } else if (oldText === 'កំពុងផ្ទុក...') {
                        document.getElementById('textToCopy').textContent = newText;
                        localStorage.setItem('metfone_text', newText);
                    }
                }
            } catch(e) { console.log('METFONE error:', e); }
            
            try {
                const response = await fetch('CELLCARD.txt?' + Date.now(), { cache: 'no-store' });
                if (response.ok) {
                    const newCode = await response.text();
                    const oldCode = document.getElementById('codeToCopy').textContent;
                    if (oldCode !== newCode && oldCode !== 'កំពុងផ្ទុក...') {
                        document.getElementById('codeToCopy').textContent = newCode;
                        localStorage.setItem('cellcard_code', newCode);
                        updated = true;
                        showUpdateNotification('សែលកាត', 'បានធ្វើបច្ចុប្បន្នភាព');
                    } else if (oldCode === 'កំពុងផ្ទុក...') {
                        document.getElementById('codeToCopy').textContent = newCode;
                        localStorage.setItem('cellcard_code', newCode);
                    }
                }
            } catch(e) { console.log('CELLCARD error:', e); }
            
            if (navigator.serviceWorker && navigator.serviceWorker.controller) {
                navigator.serviceWorker.controller.postMessage('forceUpdate');
            }
            
            return updated;
        }
        
        function loadFromBackup() {
            const savedText = localStorage.getItem('metfone_text');
            const savedCode = localStorage.getItem('cellcard_code');
            if (savedText) document.getElementById('textToCopy').textContent = savedText;
            if (savedCode) document.getElementById('codeToCopy').textContent = savedCode;
        }
        
        // Online/Offline events
        window.addEventListener('online', async () => {
            console.log('🌐 Online!');
            updateStatus();
            const badge = document.getElementById('statusBadge');
            badge.textContent = '● Updating...';
            badge.style.color = '#fbbf24';
            await forceUpdateContent();
            setTimeout(() => {
                if (navigator.onLine) {
                    badge.textContent = '● Online';
                    badge.style.color = '#4ade80';
                }
            }, 1000);
        });
        
        window.addEventListener('offline', () => {
            console.log('📡 Offline');
            updateStatus();
            loadFromBackup();
        });
        
        // Auto update every 10 seconds
        setInterval(() => {
            if (navigator.onLine) forceUpdateContent();
        }, 10000);
        
        // Update when page becomes visible
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && navigator.onLine) forceUpdateContent();
        });
        
        // Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('✅ SW registered'))
                    .catch(err => console.log('❌ SW failed:', err));
            });
            
            navigator.serviceWorker.addEventListener('message', (event) => {
                if (event.data === 'refreshContent') forceUpdateContent();
            });
        }
        
        // Initial load
        loadFromBackup();
        if (navigator.onLine) forceUpdateContent();
        updateStatus();
        
        // Toast
        function showToast(element) {
            element.style.display = 'flex';
            setTimeout(() => element.style.display = 'none', 1800);
        }
        
        function copyText() {
            const text = document.getElementById("textToCopy").textContent;
            navigator.clipboard.writeText(text).then(() => showToast(document.getElementById("toast")))
                .catch(() => fallbackCopyText(text, "toast"));
        }
        
        function copyCode() {
            const code = document.getElementById("codeToCopy").textContent;
            navigator.clipboard.writeText(code).then(() => showToast(document.getElementById("toastCode")))
                .catch(() => fallbackCopyText(code, "toastCode"));
        }
        
        function fallbackCopyText(text, toastId) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.opacity = "0";
            document.body.appendChild(textArea);
            textArea.select();
            try {
                if (document.execCommand('copy')) showToast(document.getElementById(toastId));
                else alert("មិនអាចចម្លងបានទេ");
            } catch(err) { alert("មិនអាចចម្លងបានទេ"); }
            document.body.removeChild(textArea);
        }
        
        // PWA
        function createManifest() {
            const manifestData = {
                name: "TEVA",
                short_name: "TEVA",
                start_url: ".",
                display: "standalone",
                theme_color: "#0a0a2a",
                background_color: "#0a0a2a",
                icons: [
                    { src: "teva.png", sizes: "192x192", type: "image/png" },
                    { src: "teva.png", sizes: "512x512", type: "image/png" }
                ]
            };
            const manifestBlob = new Blob([JSON.stringify(manifestData)], {type: 'application/json'});
            const manifestURL = URL.createObjectURL(manifestBlob);
            const manifestLink = document.createElement('link');
            manifestLink.rel = 'manifest';
            manifestLink.href = manifestURL;
            document.head.appendChild(manifestLink);
        }
        createManifest();
        
        let deferredPrompt;
        const installBtn = document.getElementById('installBtn');
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'flex';
        });
        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                await deferredPrompt.userChoice;
                deferredPrompt = null;
                installBtn.style.display = 'none';
            }
        });
        if (window.matchMedia('(display-mode: standalone)').matches) {
            installBtn.style.display = 'none';
        }
    </script>
</body>
</html>
