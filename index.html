<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>| TEVA |</title>
    
    <link rel="apple-touch-icon" href="teva.png">
    <link rel="icon" type="image/png" sizes="32x32" href="teva.png">
    <link rel="icon" type="image/png" sizes="192x192" href="teva.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Noto+Serif+Khmer:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <meta name="theme-color" content="#050510">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TEVA">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="TEVA">
    <meta name="msapplication-TileColor" content="#050510">
    
    <style>
        :root {
            --gold: #c9a84c;
            --gold-light: #e8d08a;
            --gold-dim: rgba(201, 168, 76, 0.25);
            --bg-deep: #050510;
            --bg-mid: #0b0b20;
            --bg-card: rgba(8, 10, 22, 0.7);
            --text-bright: #f0eadc;
            --text-muted: rgba(220, 210, 185, 0.6);
            --green: #3ddc84;
            --amber: #f59e0b;
            --font-display: 'Cormorant Garamond', 'Noto Serif Khmer', serif;
            --font-body: 'Noto Serif Khmer', 'Times New Roman', serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background: var(--bg-deep);
            font-family: var(--font-body);
        }

        /* ─── CANVAS BACKGROUND ─── */
        #bgCanvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            width: 100%;
            height: 100%;
        }

        /* ─── NOISE GRAIN OVERLAY ─── */
        .grain {
            position: fixed;
            inset: -200%;
            width: 400%;
            height: 400%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
            z-index: 1;
            animation: grainShift 8s steps(10) infinite;
        }

        @keyframes grainShift {
            0%   { transform: translate(0, 0); }
            10%  { transform: translate(-2%, -3%); }
            20%  { transform: translate(3%, 1%); }
            30%  { transform: translate(-1%, 4%); }
            40%  { transform: translate(2%, -1%); }
            50%  { transform: translate(-3%, 2%); }
            60%  { transform: translate(1%, -4%); }
            70%  { transform: translate(-2%, 3%); }
            80%  { transform: translate(3%, -2%); }
            90%  { transform: translate(-1%, 1%); }
            100% { transform: translate(0, 0); }
        }

        /* ─── STATUS BADGE ─── */
        .status-badge {
            position: fixed;
            top: 16px;
            right: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(5, 5, 16, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 6px 14px 6px 10px;
            border-radius: 100px;
            font-size: 11px;
            font-family: var(--font-display);
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            z-index: 200;
            pointer-events: none;
            border: 1px solid rgba(201, 168, 76, 0.2);
            transition: all 0.4s ease;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            transition: all 0.4s ease;
        }

        .status-badge.online .status-dot {
            background: var(--green);
            box-shadow: 0 0 8px var(--green);
            animation: pulseDot 2s ease-in-out infinite;
        }

        .status-badge.online .status-label { color: rgba(61, 220, 132, 0.9); }

        .status-badge.offline .status-dot {
            background: var(--amber);
            box-shadow: 0 0 8px var(--amber);
        }

        .status-badge.offline .status-label { color: rgba(245, 158, 11, 0.9); }

        @keyframes pulseDot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.7); }
        }

        /* ─── MAIN PANEL ─── */
        .panel {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            padding: 20px;
        }

        /* ─── WORDMARK / LOGO ─── */
        .wordmark {
            margin-bottom: 36px;
            opacity: 0;
            animation: revealUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
        }

        .wordmark-inner {
            display: inline-flex;
            align-items: center;
            gap: 16px;
        }

        .wordmark-line {
            width: 36px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold));
        }

        .wordmark-line.right {
            background: linear-gradient(90deg, var(--gold), transparent);
        }

        .wordmark-text {
            font-family: var(--font-display);
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: var(--gold);
            text-shadow: 0 0 30px rgba(201, 168, 76, 0.5);
        }

        /* ─── DATE BADGE ─── */
        .date-badge {
            margin-bottom: 28px;
            opacity: 0;
            animation: revealUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.35s forwards;
        }

        .date-pill {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(201, 168, 76, 0.07);
            border: 1px solid rgba(201, 168, 76, 0.25);
            padding: 8px 20px;
            border-radius: 100px;
            backdrop-filter: blur(12px);
        }

        .date-label {
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
            font-family: var(--font-display);
        }

        .date-sep {
            width: 1px;
            height: 12px;
            background: rgba(201, 168, 76, 0.3);
        }

        .date-value {
            font-size: 12px;
            font-weight: 600;
            color: var(--gold-light);
            font-family: var(--font-display);
            letter-spacing: 1px;
        }

        /* ─── CARD ─── */
        .card {
            width: 100%;
            max-width: 420px;
            background: var(--bg-card);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-radius: 28px;
            padding: 36px 28px 28px;
            border: 1px solid rgba(201, 168, 76, 0.15);
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.03) inset,
                0 40px 80px rgba(0, 0, 0, 0.6),
                0 0 60px rgba(201, 168, 76, 0.04);
            opacity: 0;
            animation: revealUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(201, 168, 76, 0.5), transparent);
        }

        .card-shimmer {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% -20%, rgba(201, 168, 76, 0.06) 0%, transparent 60%);
            pointer-events: none;
        }

        /* ─── BUTTONS ─── */
        .btn-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
            position: relative;
            z-index: 2;
        }

        .btn {
            position: relative;
            width: 100%;
            padding: 0;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            font-family: var(--font-body);
            font-size: 15px;
            font-weight: 600;
            overflow: hidden;
            background: none;
            outline: none;
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(201, 168, 76, 0.18);
            border-radius: 16px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn:hover .btn-inner {
            background: rgba(201, 168, 76, 0.07);
            border-color: rgba(201, 168, 76, 0.4);
            box-shadow: 0 0 20px rgba(201, 168, 76, 0.08);
        }

        .btn-sweep {
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(201, 168, 76, 0.12), transparent);
            transition: left 0.5s ease;
        }

        .btn:hover .btn-sweep {
            left: 100%;
        }

        .btn-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .btn-icon-wrap {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(201, 168, 76, 0.1);
            border: 1px solid rgba(201, 168, 76, 0.2);
            flex-shrink: 0;
            transition: all 0.3s ease;
        }

        .btn:hover .btn-icon-wrap {
            background: rgba(201, 168, 76, 0.18);
            border-color: rgba(201, 168, 76, 0.45);
            box-shadow: 0 0 12px rgba(201, 168, 76, 0.15);
        }

        .btn-icon {
            font-size: 16px;
            line-height: 1;
        }

        .btn-text-wrap {
            text-align: left;
        }

        .btn-label {
            display: block;
            color: var(--text-bright);
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.3px;
            line-height: 1.3;
        }

        .btn-sublabel {
            display: block;
            color: var(--text-muted);
            font-size: 10px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-top: 2px;
            font-family: var(--font-display);
        }

        .btn-copy-icon {
            color: var(--gold);
            opacity: 0.5;
            font-size: 14px;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .btn:hover .btn-copy-icon {
            opacity: 1;
            transform: scale(1.1);
        }

        /* ─── DIVIDER ─── */
        .card-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(201, 168, 76, 0.12), transparent);
            margin: 24px 0 20px;
        }

        /* ─── TOAST AREA ─── */
        .toast-area {
            display: flex;
            justify-content: center;
            min-height: 36px;
            align-items: center;
            position: relative;
            z-index: 2;
        }

        .toast {
            display: none;
            align-items: center;
            gap: 8px;
            background: rgba(10, 22, 16, 0.9);
            backdrop-filter: blur(20px);
            padding: 8px 20px;
            border-radius: 100px;
            border: 1px solid rgba(61, 220, 132, 0.3);
            box-shadow: 0 0 20px rgba(61, 220, 132, 0.1), 0 8px 24px rgba(0,0,0,0.4);
            animation: toastPop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .toast-check {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: rgba(61, 220, 132, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--green);
            font-size: 10px;
        }

        .toast-msg {
            font-size: 13px;
            color: var(--green);
            font-weight: 500;
            font-family: var(--font-body);
            letter-spacing: 0.3px;
        }

        @keyframes toastPop {
            from { opacity: 0; transform: scale(0.85) translateY(6px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* ─── CARD FOOTER ─── */
        .card-footer {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 16px;
            position: relative;
            z-index: 2;
        }

        .footer-dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: rgba(201, 168, 76, 0.3);
            transition: all 0.3s ease;
        }

        .card:hover .footer-dot {
            background: rgba(201, 168, 76, 0.7);
        }

        .footer-dot.center {
            width: 20px;
            border-radius: 4px;
            background: rgba(201, 168, 76, 0.5);
        }

        /* ─── INSTALL BUTTON ─── */
        .install-btn {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, var(--gold), #a8822a);
            color: var(--bg-deep);
            padding: 13px 26px;
            border-radius: 100px;
            font-size: 14px;
            font-weight: 700;
            font-family: var(--font-body);
            cursor: pointer;
            z-index: 100;
            border: none;
            box-shadow: 0 8px 28px rgba(0,0,0,0.4), 0 0 30px rgba(201, 168, 76, 0.25);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            white-space: nowrap;
            letter-spacing: 0.3px;
        }

        .install-btn:hover {
            transform: translateX(-50%) translateY(-3px);
            box-shadow: 0 14px 36px rgba(0,0,0,0.5), 0 0 40px rgba(201, 168, 76, 0.4);
        }

        .install-btn:active {
            transform: translateX(-50%) translateY(0);
        }

        .install-icon {
            font-size: 16px;
            animation: installBounce 1.5s ease-in-out infinite;
        }

        @keyframes installBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        /* ─── UPDATE TOAST ─── */
        .update-notif {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, rgba(201, 168, 76, 0.95), rgba(160, 130, 40, 0.95));
            color: var(--bg-deep);
            padding: 9px 18px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 700;
            z-index: 1000;
            font-family: var(--font-body);
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            animation: notifFade 3s ease forwards;
            white-space: nowrap;
            pointer-events: none;
        }

        @keyframes notifFade {
            0%   { opacity: 0; transform: translateX(-50%) translateY(8px); }
            12%  { opacity: 1; transform: translateX(-50%) translateY(0); }
            80%  { opacity: 1; }
            100% { opacity: 0; transform: translateX(-50%) translateY(-6px); }
        }

        /* ─── HIDDEN TEXT SOURCES ─── */
        .text-to-copy {
            position: absolute;
            opacity: 0;
            pointer-events: none;
            height: 0;
            overflow: hidden;
        }

        /* ─── ANIMATIONS ─── */
        @keyframes revealUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ─── MOBILE ─── */
        @media (max-width: 480px) {
            .panel { padding: 16px; }
            .card { padding: 28px 20px 22px; border-radius: 22px; }
            .wordmark { margin-bottom: 28px; }
            .date-badge { margin-bottom: 20px; }
            .btn-inner { padding: 14px 16px; }
            .btn-icon-wrap { width: 32px; height: 32px; border-radius: 9px; }
            .btn-label { font-size: 14px; }
        }

        /* ─── STANDALONE PWA ─── */
        @media (display-mode: standalone) {
            body { background: var(--bg-deep); }
        }
    </style>
</head>

<body>

    <!-- Canvas background -->
    <canvas id="bgCanvas"></canvas>
    <div class="grain"></div>

    <!-- Status badge -->
    <div class="status-badge online" id="statusBadge">
        <div class="status-dot"></div>
        <span class="status-label">Online</span>
    </div>

    <!-- Main panel -->
    <div class="panel">

        <!-- Wordmark -->
        <div class="wordmark">
            <div class="wordmark-inner">
                <div class="wordmark-line"></div>
                <span class="wordmark-text">TEVA</span>
                <div class="wordmark-line right"></div>
            </div>
        </div>

        <!-- Date badge -->
        <div class="date-badge">
            <div class="date-pill">
                <span class="date-label">កំណែ</span>
                <div class="date-sep"></div>
                <span class="date-value" id="versionDateValue">កំពុងផ្ទុក…</span>
            </div>
        </div>

        <!-- Card -->
        <div class="card" id="mainCard">
            <div class="card-shimmer"></div>

            <div class="btn-list">
                <!-- Metfone -->
                <button class="btn" onclick="copyText()">
                    <div class="btn-inner">
                        <div class="btn-sweep"></div>
                        <div class="btn-left">
                            <div class="btn-icon-wrap">
                                <span class="btn-icon">ᯤ</span>
                            </div>
                            <div class="btn-text-wrap">

                                <span class="btn-sublabel">Metfone</span>

                </button>

                <!-- Cellcard -->
                <button class="btn" onclick="copyCode()">
                    <div class="btn-inner">
                        <div class="btn-sweep"></div>
                        <div class="btn-left">
                            <div class="btn-icon-wrap">
                                <span class="btn-icon">ᯤ</span>
                            </div>
                            <div class="btn-text-wrap">
                                <span class="btn-label">សែលកាត</span>
                                <span class="btn-sublabel">Cellcard</span>
                            </div>
                        </div>
                        <span class="btn-copy-icon">⎘</span>
                    </div>
                </button>

                <!-- Metfone 1 -->
                <button class="btn" onclick="copyMetfone1()">
                    <div class="btn-inner">
                        <div class="btn-sweep"></div>
                        <div class="btn-left">
                            <div class="btn-icon-wrap">
                                <span class="btn-icon">ᯤ</span>
                            </div>
                            <div class="btn-text-wrap">
                                <span class="btn-label">មេតហ្វូន ១</span>
                                <span class="btn-sublabel">Metfone 1</span>
                            </div>
                        </div>
                        <span class="btn-copy-icon">⎘</span>
                    </div>
                </button>
            </div>

            <div class="card-divider"></div>

            <!-- Toast area -->
            <div class="toast-area">
                <div id="toast" class="toast">
                    <div class="toast-check">✓</div>
                    <span class="toast-msg">ចម្លងជោគជ័យ</span>
                </div>
                <div id="toastCode" class="toast">
                    <div class="toast-check">✓</div>
                    <span class="toast-msg">ចម្លងជោគជ័យ</span>
                </div>
                <div id="toastMetfone1" class="toast">
                    <div class="toast-check">✓</div>
                    <span class="toast-msg">ចម្លងជោគជ័យ</span>
                </div>
            </div>

            <!-- Footer dots -->
            <div class="card-footer">
                <div class="footer-dot"></div>
                <div class="footer-dot center"></div>
                <div class="footer-dot"></div>
            </div>
        </div>

    </div>

    <!-- Hidden copy targets -->
    <div class="text-to-copy" id="textToCopy">កំពុងផ្ទុក…</div>
    <div class="text-to-copy" id="codeToCopy">កំពុងផ្ទុក…</div>
    <div class="text-to-copy" id="metfone1ToCopy">កំពុងផ្ទុក…</div>

    <!-- Install button -->
    <button id="installBtn" class="install-btn">
        <span class="install-icon">⬇</span>
        ដំឡើងកម្មវិធី
    </button>

    <script>
    /* ══════════════════════════════════
       CANVAS BACKGROUND — Aurora Nebula
    ══════════════════════════════════ */
    (function() {
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let W, H, orbs, stars;
        let raf;

        function resize() {
            W = canvas.width  = window.innerWidth;
            H = canvas.height = window.innerHeight;
            initStars();
        }

        function initOrbs() {
            orbs = [
                { x: W * 0.8,  y: H * 0.15, r: 300, hue: 42,  sat: 60, lit: 18, vx: 0.15,  vy: 0.08,  phase: 0 },
                { x: W * 0.1,  y: H * 0.75, r: 380, hue: 220, sat: 55, lit: 14, vx: -0.1,  vy: -0.07, phase: 2 },
                { x: W * 0.45, y: H * 0.45, r: 260, hue: 35,  sat: 50, lit: 15, vx: 0.07,  vy: 0.12,  phase: 4 },
            ];
        }

        function initStars() {
            stars = [];
            const count = Math.floor((W * H) / 6000);
            for (let i = 0; i < count; i++) {
                stars.push({
                    x: Math.random() * W,
                    y: Math.random() * H,
                    r: Math.random() * 1.2 + 0.2,
                    a: Math.random() * 0.7 + 0.15,
                    twinkleSpeed: Math.random() * 0.02 + 0.005,
                    phase: Math.random() * Math.PI * 2,
                });
            }
        }

        function draw(t) {
            ctx.clearRect(0, 0, W, H);

            // Deep space gradient
            const bg = ctx.createLinearGradient(0, 0, 0, H);
            bg.addColorStop(0,   '#020208');
            bg.addColorStop(0.5, '#050512');
            bg.addColorStop(1,   '#08080e');
            ctx.fillStyle = bg;
            ctx.fillRect(0, 0, W, H);

            // Orbs
            orbs.forEach(o => {
                o.phase += 0.003;
                o.x += Math.sin(o.phase * 0.7) * 0.4 + o.vx * 0.1;
                o.y += Math.cos(o.phase * 0.5) * 0.3 + o.vy * 0.1;
                // Soft wrap
                if (o.x < -o.r) o.x = W + o.r;
                if (o.x > W + o.r) o.x = -o.r;
                if (o.y < -o.r) o.y = H + o.r;
                if (o.y > H + o.r) o.y = -o.r;

                const alpha = 0.22 + Math.sin(o.phase) * 0.06;
                const grad = ctx.createRadialGradient(o.x, o.y, 0, o.x, o.y, o.r);
                grad.addColorStop(0,   `hsla(${o.hue}, ${o.sat}%, ${o.lit}%, ${alpha})`);
                grad.addColorStop(0.5, `hsla(${o.hue}, ${o.sat - 10}%, ${o.lit - 5}%, ${alpha * 0.4})`);
                grad.addColorStop(1,   'transparent');
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(o.x, o.y, o.r, 0, Math.PI * 2);
                ctx.fill();
            });

            // Stars
            stars.forEach(s => {
                s.phase += s.twinkleSpeed;
                const alpha = s.a * (0.6 + 0.4 * Math.sin(s.phase));
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(240, 235, 215, ${alpha})`;
                ctx.fill();
            });

            // Horizontal mist at bottom
            const mist = ctx.createLinearGradient(0, H * 0.65, 0, H);
            mist.addColorStop(0, 'transparent');
            mist.addColorStop(0.5, 'rgba(20,18,12,0.15)');
            mist.addColorStop(1,   'rgba(5,5,16,0.5)');
            ctx.fillStyle = mist;
            ctx.fillRect(0, 0, W, H);

            raf = requestAnimationFrame(draw);
        }

        window.addEventListener('resize', () => { resize(); initOrbs(); });
        resize();
        initOrbs();
        draw(0);
    })();

    /* ══════════════════════════════════
       VERSION DATE
    ══════════════════════════════════ */
    const khmerMonths = ['មករា','កុម្ភៈ','មីនា','មេសា','ឧសភា','មិថុនា',
                         'កក្កដា','សីហា','កញ្ញា','តុលា','វិច្ឆិកា','ធ្នូ'];

    function formatDate(d) {
        return `${d.getDate().toString().padStart(2,'0')} ${khmerMonths[d.getMonth()]} ${d.getFullYear()}`;
    }

    function updateVersionDate() {
        const now = new Date();
        document.getElementById('versionDateValue').textContent = formatDate(now);
        localStorage.setItem('last_version_update', now.toISOString());
    }

    function loadSavedVersionDate() {
        const saved = localStorage.getItem('last_version_update');
        if (saved) {
            try {
                document.getElementById('versionDateValue').textContent = formatDate(new Date(saved));
            } catch(e) { updateVersionDate(); }
        } else {
            updateVersionDate();
        }
    }

    /* ══════════════════════════════════
       STATUS BADGE
    ══════════════════════════════════ */
    function updateStatusBadge() {
        const badge = document.getElementById('statusBadge');
        const label = badge.querySelector('.status-label');
        if (navigator.onLine) {
            badge.className = 'status-badge online';
            label.textContent = 'Online';
        } else {
            badge.className = 'status-badge offline';
            label.textContent = 'Offline';
        }
    }

    /* ══════════════════════════════════
       UPDATE NOTIFICATION
    ══════════════════════════════════ */
    function showUpdateNotification(title, message) {
        document.querySelectorAll('.update-notif').forEach(n => n.remove());
        const n = document.createElement('div');
        n.className = 'update-notif';
        n.textContent = `✦ ${title}: ${message}`;
        document.body.appendChild(n);
        setTimeout(() => n.remove(), 3200);
    }

    /* ══════════════════════════════════
       TOAST
    ══════════════════════════════════ */
    function showToast(el) {
        // hide all toasts first
        document.querySelectorAll('.toast').forEach(t => { t.style.display = 'none'; });
        el.style.display = 'flex';
        setTimeout(() => { el.style.display = 'none'; }, 2000);
    }

    /* ══════════════════════════════════
       COPY FUNCTIONS
    ══════════════════════════════════ */
    function copyText() {
        const text = document.getElementById('textToCopy').textContent;
        navigator.clipboard.writeText(text)
            .then(() => showToast(document.getElementById('toast')))
            .catch(() => fallbackCopy(text, 'toast'));
    }

    function copyCode() {
        const code = document.getElementById('codeToCopy').textContent;
        navigator.clipboard.writeText(code)
            .then(() => showToast(document.getElementById('toastCode')))
            .catch(() => fallbackCopy(code, 'toastCode'));
    }

    function copyMetfone1() {
        const content = document.getElementById('metfone1ToCopy').textContent;
        navigator.clipboard.writeText(content)
            .then(() => showToast(document.getElementById('toastMetfone1')))
            .catch(() => fallbackCopy(content, 'toastMetfone1'));
    }

    function fallbackCopy(text, toastId) {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0;';
        document.body.appendChild(ta);
        ta.select();
        try {
            if (document.execCommand('copy')) showToast(document.getElementById(toastId));
        } catch(e) {}
        document.body.removeChild(ta);
    }

    /* ══════════════════════════════════
       CONTENT LOADING
    ══════════════════════════════════ */
    let isFirstLoad = true;

    async function loadTextContent() {
        const el = document.getElementById('textToCopy');
        const old = localStorage.getItem('metfone_text');
        try {
            const res = await fetch('METFONE.txt?' + Date.now(), { cache: 'no-store' });
            if (res.ok) {
                const txt = await res.text();
                el.textContent = txt;
                const changed = old && old !== txt;
                if (changed && !isFirstLoad) showUpdateNotification('មេតហ្វូន', 'បានធ្វើបច្ចុប្បន្នភាព');
                localStorage.setItem('metfone_text', txt);
                return !!changed;
            }
        } catch(e) {}
        if (old) el.textContent = old;
        else el.textContent = 'កាកម៉េសហ្អា';
        return false;
    }

    async function loadCodeContent() {
        const el = document.getElementById('codeToCopy');
        const old = localStorage.getItem('cellcard_code');
        try {
            const res = await fetch('CELLCARD.txt?' + Date.now(), { cache: 'no-store' });
            if (res.ok) {
                const txt = await res.text();
                el.textContent = txt;
                const changed = old && old !== txt;
                if (changed && !isFirstLoad) showUpdateNotification('សែលកាត', 'បានធ្វើបច្ចុប្បន្នភាព');
                localStorage.setItem('cellcard_code', txt);
                return !!changed;
            }
        } catch(e) {}
        if (old) el.textContent = old;
        else el.textContent = 'TEVA555';
        return false;
    }

    async function loadMetfone1Content() {
        const el = document.getElementById('metfone1ToCopy');
        const old = localStorage.getItem('metfone1_text');
        try {
            const res = await fetch('METFONE1.txt?' + Date.now(), { cache: 'no-store' });
            if (res.ok) {
                const txt = await res.text();
                el.textContent = txt;
                const changed = old && old !== txt;
                if (changed && !isFirstLoad) showUpdateNotification('មេតហ្វូន ១', 'បានធ្វើបច្ចុប្បន្នភាព');
                localStorage.setItem('metfone1_text', txt);
                return !!changed;
            }
        } catch(e) {}
        if (old) el.textContent = old;
        else el.textContent = 'កាកម៉េសហ្អា1';
        return false;
    }

    /* ══════════════════════════════════
       FORCE UPDATE HELPERS
    ══════════════════════════════════ */
    async function forceUpdateTextContent() {
        const el = document.getElementById('textToCopy');
        const old = localStorage.getItem('metfone_text');
        try {
            const res = await fetch('METFONE.txt?' + Date.now(), { cache: 'no-store', headers: { 'Cache-Control': 'no-cache, no-store' } });
            if (res.ok) {
                const txt = await res.text();
                if (old !== txt) {
                    el.textContent = txt;
                    localStorage.setItem('metfone_text', txt);
                    showUpdateNotification('មេតហ្វូន', 'បានធ្វើបច្ចុប្បន្នភាពដោយស្វ័យប្រវត្តិ');
                    return true;
                }
            }
        } catch(e) {}
        return false;
    }

    async function forceUpdateCodeContent() {
        const el = document.getElementById('codeToCopy');
        const old = localStorage.getItem('cellcard_code');
        try {
            const res = await fetch('CELLCARD.txt?' + Date.now(), { cache: 'no-store', headers: { 'Cache-Control': 'no-cache' } });
            if (res.ok) {
                const txt = await res.text();
                if (old !== txt) {
                    el.textContent = txt;
                    localStorage.setItem('cellcard_code', txt);
                    showUpdateNotification('សែលកាត', 'បានធ្វើបច្ចុប្បន្នភាពដោយស្វ័យប្រវត្តិ');
                    return true;
                }
            }
        } catch(e) {}
        return false;
    }

    async function forceUpdateMetfone1Content() {
        const el = document.getElementById('metfone1ToCopy');
        const old = localStorage.getItem('metfone1_text');
        try {
            const res = await fetch('METFONE1.txt?' + Date.now(), { cache: 'no-store', headers: { 'Cache-Control': 'no-cache, no-store, must-revalidate', 'Pragma': 'no-cache' } });
            if (res.ok) {
                const txt = await res.text();
                if (old !== txt) {
                    el.textContent = txt;
                    localStorage.setItem('metfone1_text', txt);
                    showUpdateNotification('មេតហ្វូន ១', 'បានធ្វើបច្ចុប្បន្នភាពដោយស្វ័យប្រវត្តិ');
                    return true;
                }
            }
        } catch(e) {}
        return false;
    }

    /* ══════════════════════════════════
       AUTO UPDATE
    ══════════════════════════════════ */
    let lastUpdateCheck = 0;
    let isChecking = false;

    async function autoUpdateCheck() {
        if (!navigator.onLine || isChecking) return;
        const now = Date.now();
        if (now - lastUpdateCheck < 30000) return;
        lastUpdateCheck = now;
        isChecking = true;
        try {
            const [a, b, c] = await Promise.all([
                forceUpdateTextContent(),
                forceUpdateCodeContent(),
                forceUpdateMetfone1Content()
            ]);
            if (a || b || c) updateVersionDate();
        } catch(e) {}
        finally { isChecking = false; }
    }

    /* ══════════════════════════════════
       SERVICE WORKER
    ══════════════════════════════════ */
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.addEventListener('message', e => {
            if (e.data.type === 'contentUpdated' || e.data.type === 'backgroundUpdate') {
                updateVersionDate();
                showUpdateNotification('ជូនដំណឹង', 'កូដត្រូវបានធ្វើបច្ចុប្បន្នភាព');
            }
            if (e.data.type === 'updatesChecked' && e.data.hasUpdates) updateVersionDate();
        });
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').catch(() => {});
        });
    }

    /* ══════════════════════════════════
       EVENTS
    ══════════════════════════════════ */
    window.addEventListener('online',  () => {
        updateStatusBadge();
        showUpdateNotification('បណ្តាញ', 'ភ្ជាប់អ៊ីនធឺណិតហើយ');
        setTimeout(() => {
            Promise.all([forceUpdateTextContent(), forceUpdateCodeContent(), forceUpdateMetfone1Content()])
                .then(([a,b,c]) => { if(a||b||c) updateVersionDate(); });
        }, 100);
    });
    window.addEventListener('offline', updateStatusBadge);
    document.addEventListener('visibilitychange', () => { if (!document.hidden && navigator.onLine) autoUpdateCheck(); });
    setInterval(() => { if (navigator.onLine) autoUpdateCheck(); }, 30000);
    if ('connection' in navigator) navigator.connection.addEventListener('change', () => { if (navigator.onLine) autoUpdateCheck(); });

    /* ══════════════════════════════════
       PWA MANIFEST + INSTALL
    ══════════════════════════════════ */
    (function createManifest() {
        const data = {
            name: "TEVA", short_name: "TEVA",
            description: "TEVA - Code Copy",
            start_url: ".", display: "standalone",
            orientation: "portrait",
            theme_color: "#050510", background_color: "#050510",
            icons: [
                { src: "teva.png", sizes: "192x192", type: "image/png", purpose: "any maskable" },
                { src: "teva.png", sizes: "512x512", type: "image/png", purpose: "any maskable" }
            ]
        };
        const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
        const link = document.createElement('link');
        link.rel = 'manifest';
        link.href = URL.createObjectURL(blob);
        document.head.appendChild(link);
    })();

    let deferredPrompt;
    const installBtn = document.getElementById('installBtn');
    window.addEventListener('beforeinstallprompt', e => {
        e.preventDefault();
        deferredPrompt = e;
        installBtn.style.display = 'flex';
    });
    installBtn.addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            await deferredPrompt.userChoice;
            deferredPrompt = null;
            installBtn.style.display = 'none';
        }
    });
    window.addEventListener('appinstalled', () => {
        installBtn.style.display = 'none';
        deferredPrompt = null;
        showUpdateNotification('ជោគជ័យ', 'បានដំឡើងកម្មវិធី');
    });
    if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) {
        installBtn.style.display = 'none';
    }

    /* ══════════════════════════════════
       INIT
    ══════════════════════════════════ */
    loadSavedVersionDate();
    Promise.all([loadTextContent(), loadCodeContent(), loadMetfone1Content()])
        .then(([a,b,c]) => { if(a||b||c) updateVersionDate(); });
    updateStatusBadge();
    setTimeout(() => { isFirstLoad = false; }, 1000);
    </script>
